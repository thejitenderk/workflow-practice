name: Infra Setup

on:
  workflow_dispatch: 
  pull_request: 
    branches:
      - main
  push:
    branches:
      - main
  

# user define
# pre-define variable
# run time variable

jobs:
  terraform_init:
    name: Terraform Init
    runs-on: ubuntu-latest
    steps:
      - name: Terraform setup
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Checkout
        uses: actions/checkout@v6

      - name: list
        run: ls -ltr

      - name: Terraform Init
        run: terraform init
