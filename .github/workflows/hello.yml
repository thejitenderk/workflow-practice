name: Greetings

on:
  workflow_dispatch: 

env:
  NAME: 'jitender'

jobs:
  greeting:
    name: Greeting Audience
    runs-on: windows-latest
    steps:
      - name: Hello Audience
        run: write-host "Hello $NAME, How are you?"
        
  linuxgreeting:
    name: reply by linux $name
    needs: greeting
    runs-on: ubuntu-slim
    steps:
      - name: Hello Audience $NAME
        run: echo "Hello Guys What's Up, I'm good"
  
