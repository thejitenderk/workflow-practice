name: Greetings

on:
  workflow_dispatch: 

#pipeline level agent ko assign nhi kar sakte

jobs:
  greeting:
    name: Greeting Audience
    runs-on: windows-latest
    steps:
      - name: Hello Audience
        run: write-host "Hello Guys What's Up"
        
  linuxgreeting:
    name: Greeting Audience by linux
    needs: greeting
    runs-on: ubuntu-slim
    steps:
      - name: Hello Audience
        run: echo "Hello Guys What's Up"
  
