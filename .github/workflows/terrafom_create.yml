name: Infra Setup

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
   name: Terraform Infra
   runs-on: arc-runner-set
   defaults:
     run: 
       working-directory: environment/dev
   steps:
      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.3
    
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: version
        run: |
          cat /etc/os-release
          terraform --version

    
